<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Torre Logística Claro</title>

<style>
:root {
    --azul-claro: #1f355c;
    --vermelho-claro: #e60000;
    --fundo: #dfe1e6;
    --card-bg: #f7f7f7;
    --texto: #1f2937;
    --sombra: 0 8px 20px rgba(0,0,0,0.08);
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    min-height: 100%;
    font-family: Arial, sans-serif;
    background-color: var(--fundo);
    color: var(--texto);
}

body.locked {
    overflow: hidden;
}

/* ============================= */
/* CAMADA DE SEGURANÇA */
/* ============================= */

#loginOverlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(31, 53, 92, 0.92);
}

.login-box {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    text-align: center;
}

.login-box h2 {
    margin: 0 0 12px;
    color: var(--azul-claro);
    font-size: 28px;
}

.login-box p {
    margin: 0 0 20px;
    color: #4b5563;
    font-size: 15px;
}

.login-box input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border: 1px solid #cfd6e4;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
}

.login-box input:focus {
    border-color: var(--azul-claro);
    box-shadow: 0 0 0 3px rgba(31, 53, 92, 0.12);
}

.login-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
}

.login-box button {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 10px;
    background: var(--vermelho-claro);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease;
}

.login-box button:hover {
    background: #c70000;
    transform: translateY(-1px);
}

.erro {
    min-height: 22px;
    margin-top: 12px;
    color: #c70000;
    font-size: 14px;
}

/* ============================= */
/* PORTAL */
/* ============================= */

.header {
    background-color: var(--azul-claro);
    color: white;
    padding: 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
}

.container {
    padding: 44px 32px 56px;
}

/* Grid com os cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 32px;
    align-items: stretch;
}

.card {
    background: var(--card-bg);
    border-radius: 18px;
    min-height: 184px;
    padding: 26px 20px;
    text-align: center;
    text-decoration: none;
    color: #333;
    box-shadow: var(--sombra);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 28px rgba(0,0,0,0.12);
}

.icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background-color: var(--vermelho-claro);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 36px;
    line-height: 1;
}

.title {
    font-weight: 700;
    font-size: 17px;
    line-height: 1.3;
}

/* ============================= */
/* RESPONSIVO */
/* ============================= */

@media (max-width: 1280px) {
    .grid {
        grid-template-columns: repeat(2, minmax(260px, 1fr));
    }
}

@media (max-width: 720px) {
    .header h1 {
        font-size: 18px;
    }

    .container {
        padding: 28px 18px 40px;
    }

    .grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .card {
        min-height: 160px;
    }
}
</style>
</head>

<body class="locked">

<!-- ============================= -->
<!-- CAMADA DE SEGURANÇA -->
<!-- ============================= -->

<div id="loginOverlay" aria-hidden="false">
    <div class="login-box">
        <h2>Acesso Restrito</h2>
        <p>Informe a senha para acessar a página principal.</p>

        <input
            type="password"
            id="senha"
            placeholder="Digite a senha"
            autocomplete="current-password"
        />

        <div class="login-actions">
            <button type="button" onclick="validarSenha()">Entrar</button>
        </div>

        <div id="erro" class="erro"></div>
    </div>
</div>

<!-- ============================= -->
<!-- CABEÇALHO -->
<!-- ============================= -->

<div class="header">
    <h1>Claro | Torre - Central de Controle</h1>
</div>

<!-- ============================= -->
<!-- CARDS DOS INDICADORES -->
<!-- ============================= -->

<div class="container">
    <div class="grid">

        <!-- 1º BOTÃO - CHATBOT TORRE LOGÍSTICA -->
        <a class="card"
           href="https://chatbot-logistica-e4cpfbcta3qyqchopsdjeg.streamlit.app/"
           target="_blank"
           rel="noopener noreferrer">
            <div class="icon">🤖</div>
            <div class="title">Chatbot Torre Logística</div>
        </a>

        <!-- 2º BOTÃO - SEPARAÇÃO E FATURAMENTO -->
        <a class="card"
           href="https://dashboard-slaseparacaofaturamento-mdnfzinkaebwzysne83ewp.streamlit.app/"
           target="_blank"
           rel="noopener noreferrer">
            <div class="icon">📊</div>
            <div class="title">Separação e Faturamento</div>
        </a>

        <!-- 3º BOTÃO - PEDIDOS PARA LPS -->
        <a class="card"
           href="https://pedidoslpsaas-y44bkbmcg4kon8fogbro34.streamlit.app/"
           target="_blank"
           rel="noopener noreferrer">
            <div class="icon">📦</div>
            <div class="title">Pedidos para LPs</div>
        </a>

        <!-- 4º BOTÃO - RESULTADO DO DRE -->
        <a class="card"
           href="https://resultadodre-lk6rh4ahefeuwfhwrg2ioc.streamlit.app/"
           target="_blank"
           rel="noopener noreferrer">
            <div class="icon">💰</div>
            <div class="title">Resultado do DRE</div>
        </a>

        <!-- 5º BOTÃO - VALORES DOS EAS -->
        <a class="card"
           href="https://valorestoques-eas-73bxfsks3rnoxjo44fuqm7.streamlit.app/"

            <div class="icon">📈</div>
            <div class="title">Valores dos EAs</div>
        </a>

    </div>
</div>

<!-- ============================= -->
<!-- SCRIPT DA SENHA -->
<!-- ============================= -->

<script>
const SENHA_PORTAL = 'claro2026';

const loginOverlay = document.getElementById('loginOverlay');
const erro = document.getElementById('erro');
const senhaInput = document.getElementById('senha');

function liberarPortal() {
    loginOverlay.style.display = 'none';
    loginOverlay.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('locked');
    erro.textContent = '';
}

function bloquearPortal() {
    loginOverlay.style.display = 'flex';
    loginOverlay.setAttribute('aria-hidden', 'false');
    document.body.classList.add('locked');
}

function validarSenha() {
    const senha = senhaInput.value;

    if (senha === SENHA_PORTAL) {
        sessionStorage.setItem('portalLiberado', 'sim');
        liberarPortal();
    } else {
        erro.textContent = 'Senha incorreta.';
        senhaInput.focus();
        senhaInput.select();
    }
}

senhaInput.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        validarSenha();
    }
});

window.addEventListener('load', function() {
    if (sessionStorage.getItem('portalLiberado') === 'sim') {
        liberarPortal();
    } else {
        bloquearPortal();
        senhaInput.focus();
    }
});
</script>

</body>
</html>
